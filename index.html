<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:#f5f4f0;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  -webkit-text-size-adjust:100%;
}
@media(prefers-color-scheme:dark){
  body{background:#1a1a18}
  :root{
    --card:#242422;--bg2:#2e2e2b;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.22);
    --t1:#f0ede8;--t2:#888;
  }
}
@media(prefers-color-scheme:light){
  :root{
    --card:#ffffff;--bg2:#f1efe8;
    --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.25);
    --t1:#1a1a1a;--t2:#666;
  }
}
:root{
  --accent:#E24B4A;--accent2:#378ADD;--accent3:#BA7517;
}
#root{min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}

/* Top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  padding-top:max(12px, env(safe-area-inset-top));
  background:var(--card);
  border-bottom:0.5px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.logo{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--accent)}
.logo span{color:var(--t1)}
.datebadge{font-size:11px;color:var(--t2);background:var(--bg2);padding:4px 10px;border-radius:20px}

/* Bottom nav (mobile-first) */
.nav{
  display:flex;background:var(--card);
  border-top:0.5px solid var(--border);
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:50;
}
.navbtn{
  flex:1;padding:10px 4px 8px;font-size:10px;
  border:none;background:transparent;color:var(--t2);
  cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.navbtn.active{color:var(--accent);font-weight:600}
.navbtn svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}

/* Content area */
.content{
  padding:16px;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
  flex:1;
}

/* Cards */
.card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.cardtitle{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ptitle{font-size:26px;font-weight:800;letter-spacing:.5px;color:var(--t1);margin-bottom:2px}
.psub{font-size:13px;color:var(--t2);margin-bottom:16px}

/* Forms */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fg label{font-size:12px;color:var(--t2);font-weight:500}
.fg input,.fg select{
  height:42px;border:0.5px solid var(--border2);border-radius:10px;
  padding:0 12px;font-size:16px;/* 16px prevents iOS zoom */
  background:var(--bg2);color:var(--t1);font-family:inherit;width:100%;
}
.fg input:focus,.fg select:focus{outline:2px solid var(--accent);outline-offset:-1px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Buttons */
.btn{
  height:44px;padding:0 18px;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  -webkit-appearance:none;
}
.btnp{background:var(--accent);color:#fff;border:none}
.btnp:active{opacity:.8}
.btns{background:transparent;color:var(--t1);border:0.5px solid var(--border2)}
.btns:active{background:var(--bg2)}
.btnsm{height:34px;padding:0 12px;font-size:13px;border-radius:8px}
.btnd{
  background:transparent;color:#E24B4A;border:0.5px solid #E24B4A;
  height:30px;padding:0 10px;font-size:12px;border-radius:8px;
  cursor:pointer;font-family:inherit;font-weight:500;
}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.tr{background:#FCEBEB;color:#A32D2D}
.tb{background:#E6F1FB;color:#185FA5}
.tg{background:#EAF3DE;color:#3B6D11}
.ta{background:#FAEEDA;color:#854F0B}
.tp{background:#FBEAF0;color:#72243E}
@media(prefers-color-scheme:dark){
  .tr{background:#3a1515;color:#f09595}
  .tb{background:#0d2a42;color:#85B7EB}
  .tg{background:#152a0a;color:#97C459}
  .ta{background:#2e1d04;color:#EF9F27}
  .tp{background:#2a0e1c;color:#ED93B1}
}

/* Exercise picker */
.picker-wrap{position:relative}
.picker-search{
  width:100%;height:44px;border:0.5px solid var(--border2);border-radius:10px;
  padding:0 14px;font-size:16px;background:var(--bg2);color:var(--t1);font-family:inherit;
}
.picker-search:focus{outline:2px solid var(--accent);outline-offset:-1px}
.picker-dropdown{
  position:absolute;top:48px;left:0;right:0;
  background:var(--card);border:0.5px solid var(--border2);border-radius:12px;
  z-index:200;max-height:300px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
}
.picker-group-label{
  padding:8px 14px 4px;font-size:10px;font-weight:600;color:var(--t2);
  text-transform:uppercase;letter-spacing:.5px;
  position:sticky;top:0;background:var(--card);border-bottom:0.5px solid var(--border);
}
.picker-option{
  padding:12px 14px;font-size:15px;color:var(--t1);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  -webkit-tap-highlight-color:rgba(0,0,0,.05);
}
.picker-option:active{background:var(--bg2)}
.picker-new-row{
  padding:12px 14px;font-size:13px;color:var(--accent2);cursor:pointer;
  display:flex;align-items:center;gap:8px;border-top:0.5px solid var(--border);
  font-weight:500;
}
.picker-new-row:active{background:var(--bg2)}

/* Exercise block */
.exblock{border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;background:var(--card)}
.exblock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.exblock-name{font-size:15px;font-weight:600;color:var(--t1)}

.series-header{display:grid;gap:6px;font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;align-items:center}
.series-row{display:grid;gap:6px;align-items:center;margin-bottom:8px}
.series-header.strength,.series-row.strength{grid-template-columns:28px 1fr 1fr 28px}
.series-header.cardio,.series-row.cardio{grid-template-columns:28px 1fr 28px}
.series-input{
  height:36px;border:0.5px solid var(--border2);border-radius:8px;
  padding:0 8px;font-size:16px;background:var(--bg2);color:var(--t1);
  font-family:inherit;width:100%;text-align:center;
}
.series-input:focus{outline:2px solid var(--accent);outline-offset:-1px}
.series-num{font-size:12px;color:var(--t2);font-weight:600;text-align:center}
.rmv-btn{background:transparent;border:none;color:var(--t2);cursor:pointer;font-size:18px;padding:0;opacity:.5;line-height:1}
.rmv-btn:active{opacity:1;color:#E24B4A}
.add-set-btn{
  height:34px;font-size:13px;background:transparent;
  border:0.5px dashed var(--border2);border-radius:8px;
  color:var(--t2);cursor:pointer;font-family:inherit;width:100%;margin-top:4px;
}
.add-set-btn:active{background:var(--bg2)}

/* Calorie preview */
.cal-preview{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:#FAEEDA;border:0.5px solid #FAC775;border-radius:12px;margin-bottom:12px;
}
@media(prefers-color-scheme:dark){.cal-preview{background:#2e1d04;border-color:#854F0B}}
.kcal-num{font-size:28px;font-weight:800;color:#BA7517}
.kcal-sub{font-size:12px;color:#854F0B;font-weight:500}
.kcal-note{font-size:11px;color:#854F0B;opacity:.8;margin-top:2px}

/* Stats */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mcard{background:var(--bg2);border-radius:10px;padding:12px 14px}
.mlabel{font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:500}
.mval{font-size:22px;font-weight:700;color:var(--t1)}
.mval .unit{font-size:12px;color:var(--t2);font-weight:400}
.chartw{position:relative;width:100%;height:200px}

/* History cards */
.hcard{background:var(--card);border:0.5px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.hcard-open{border-color:var(--border2)}
.hcard-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hcard-header:active{background:var(--bg2)}
.hcard-left{flex:1;min-width:0}
.hcard-date{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px}
.hcard-meta{display:flex;gap:5px;flex-wrap:wrap}
.hcard-chevron{color:var(--t2);flex-shrink:0;transition:transform .22s cubic-bezier(.2,.8,.4,1)}

/* Session detail */
.session-detail-wrap{
  display:grid;
  grid-template-rows:0fr;
  transition:grid-template-rows .32s cubic-bezier(.2,.8,.4,1);
}
.hcard-open .session-detail-wrap{
  grid-template-rows:1fr;
}
.session-detail-wrap-inner{
  overflow:hidden;
}
.session-detail{
  padding:0 16px 16px;
  border-top:0.5px solid var(--border);
  opacity:0;
  transform:translateY(-6px);
  transition:opacity .25s .1s ease, transform .3s .08s cubic-bezier(.2,.8,.4,1);
}
.hcard-open .session-detail{
  opacity:1;
  transform:translateY(0);
}
.session-detail-stats{display:flex;gap:8px;padding:14px 0 12px;border-bottom:0.5px solid var(--border);margin-bottom:14px}
.sds-item{flex:1;text-align:center;padding:10px 6px;background:var(--bg2);border-radius:10px}
.sds-val{font-size:17px;font-weight:800;color:var(--t1);line-height:1;font-variant-numeric:tabular-nums}
.sds-label{font-size:10px;color:var(--t2);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}

.session-detail-exercises{display:flex;flex-direction:column;gap:12px}
.sde-row{padding:12px 14px;background:var(--bg2);border-radius:10px}
.sde-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sde-name{font-size:14px;font-weight:600;color:var(--t1)}
.sde-sets{display:flex;flex-direction:column;gap:5px}
.sde-set{display:grid;grid-template-columns:20px 1fr auto auto 1fr;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border)}

/* Period tabs */

/* Rec */
.reccard{border-left:3px solid var(--accent2);padding-left:14px;margin-bottom:18px}
.rectitle{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px}
.recbody{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:5px}
.recsrc{font-size:11px;color:var(--accent2);font-weight:500}
.aibox{border:0.5px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:16px;background:var(--bg2)}
.ailabel{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{

/* Profile */
.profile-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:10px;margin-bottom:12px;font-size:13px;color:var(--t2)}
.method-note{font-size:11px;color:var(--t2);background:var(--bg2);border-radius:8px;padding:9px 12px;margin-top:8px;line-height:1.55}

/* Profile tab */
.profile-hero{position:relative;display:flex;align-items:center;gap:16px;padding:20px;background:var(--card);border:0.5px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden}

.weight-log-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ach-card{border:0.5px solid var(--border);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;transition:opacity .2s}
.ach-card.unlocked{background:var(--card);border-color:var(--border2)}

.ach-card.unlocked::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:12px 12px 0 0}
.ach-icon{font-size:28px;line-height:1}
.ach-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2}

.ach-prog{height:100%;border-radius:2px;transition:width .6s .2s cubic-bezier(.2,.8,.4,1)}
.ach-prog-label{font-size:10px;color:var(--t2);margin-top:2px}
.ach-cat-label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.ach-summary{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border-radius:10px;margin-bottom:12px}
.ach-summary-num{font-size:28px;font-weight:800;color:var(--accent)}
.ach-summary-text{font-size:13px;color:var(--t2)}
.pbar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:6px}
.pbarf{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.rowflex{display:flex;gap:8px;align-items:center;justify-content:space-between}
.empty{text-align:center;padding:40px 16px;color:var(--t2)}

/* Workout Timer */
.workout-timer{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:0.5px solid var(--border);border-radius:12px;margin-bottom:12px}
.timer-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:timerPulse 1.4s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.timer-display{font-size:22px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:1px;flex:1}
.timer-label{font-size:11px;color:var(--t2);font-weight:500}

/* Active session indicator on nav */
.navbtn-wrap{position:relative;flex:1;display:flex;flex-direction:column;align-items:center}
.navbtn-dot{position:absolute;top:8px;right:calc(50% - 16px);width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--card);animation:timerPulse 1.4s ease-in-out infinite}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border2);background:transparent;color:var(--t1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:active{background:var(--bg2)}
.cal-month-label{font-size:15px;font-weight:700;color:var(--t1)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:600;color:var(--t2);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.3px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--t2);position:relative;cursor:default}
.cal-day.other-month{opacity:.28}
.cal-day.trained{background:var(--accent);color:#fff;font-weight:700}
.cal-day.today{box-shadow:0 0 0 2px var(--accent2);color:var(--accent2);font-weight:700}
.cal-day.trained.today{background:var(--accent);color:#fff;box-shadow:0 0 0 2px var(--accent2)}
.cal-day.trained::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.6)}
.cal-legend{display:flex;align-items:center;gap:16px;margin-top:10px;font-size:11px;color:var(--t2)}
.cal-legend-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}

/* Session Complete Modal */
.sc-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;
  display:flex;align-items:flex-end;justify-content:center;
  animation:scFadeIn .25s ease;
}
@keyframes scFadeIn{from{opacity:0}to{opacity:1}}
.sc-sheet{
  background:var(--card);border-radius:28px 28px 0 0;
  width:100%;max-height:93vh;overflow-y:auto;
  padding:0 0 calc(24px + env(safe-area-inset-bottom));
  animation:scSlideUp .35s cubic-bezier(.2,.8,.4,1);
}
@keyframes scSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sc-header{
  position:relative;text-align:center;
  padding:28px 20px 20px;
  background:linear-gradient(160deg,#1a0a0a 0%,#2d0d0d 50%,#1a0a0a 100%);
  border-radius:28px 28px 0 0;overflow:hidden;
}
.sc-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(220,55,55,.35) 0%,transparent 70%);
}
.sc-emoji{font-size:52px;display:block;margin-bottom:10px;position:relative;animation:scBounce .6s .3s both cubic-bezier(.2,.8,.4,1.4)}
@keyframes scBounce{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.sc-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:.5px;position:relative}
.sc-subtitle{font-size:14px;color:rgba(255,255,255,.6);margin-top:4px;position:relative}

.sc-body{padding:20px}
.sc-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sc-stat{background:var(--bg2);border-radius:12px;padding:14px 10px;text-align:center;border:0.5px solid var(--border)}
.sc-stat-val{font-size:22px;font-weight:800;color:var(--t1);line-height:1}
.sc-stat-unit{font-size:11px;color:var(--t2);margin-top:2px}
.sc-stat-label{font-size:10px;color:var(--t2);margin-top:6px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.sc-stat.highlight .sc-stat-val{color:var(--accent)}

.sc-map-title{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.sc-map-wrap{display:flex;gap:8px;justify-content:center;align-items:flex-start;margin-bottom:16px}
.sc-map-side{text-align:center}
.sc-map-side-label{font-size:10px;color:var(--t2);margin-top:6px;font-weight:500}

.sc-muscle-legend{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.sc-legend-row{display:flex;align-items:center;gap:10px}
.sc-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sc-legend-name{font-size:13px;color:var(--t1);flex:1;font-weight:500}
.sc-legend-bar-wrap{flex:2;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.sc-legend-bar{height:100%;border-radius:3px;transition:width .8s .4s cubic-bezier(.2,.8,.4,1)}
.sc-legend-pct{font-size:12px;color:var(--t2);min-width:30px;text-align:right;font-weight:600}

@media(min-width:600px){
  .sc-sheet{border-radius:20px;width:min(480px,92vw);margin-bottom:40px}
  .sc-overlay{align-items:center}
}
.empty-icon{font-size:36px;margin-bottom:8px}

/* Responsive */
@media(min-width:600px){
  .mgrid{grid-template-columns:repeat(4,1fr)}
  .nav{position:static;border-top:none;border-bottom:0.5px solid var(--border);padding-bottom:0}
  .navbtn{flex-direction:row;font-size:13px;padding:12px 16px;gap:6px}
  .navbtn svg{width:18px;height:18px}
  .content{padding-bottom:16px}
  .overlay{align-items:center}
  .modal{border-radius:20px;width:min(480px,92vw);max-height:85vh}
  .modal-handle{display:none}
}

<body>
<div id="root"></div>

<script>
const {useState,useEffect,useRef,useMemo} = React;
const h = React.createElement;

// ---- Constants ----
const MUSCLES=['Pecho','Espalda','Piernas','Hombros','Bíceps','Tríceps','Core','Glúteos','Cardio'];
const MUSCLE_COLORS={Pecho:'tr',Espalda:'tb',Piernas:'tg',Hombros:'ta',Bíceps:'tb',Tríceps:'tr',Core:'tp',Glúteos:'tg',Cardio:'tb'};
const MUSCLE_MET={Pecho:4.0,Espalda:4.2,Piernas:5.0,Hombros:3.8,Bíceps:3.5,Tríceps:3.5,Core:3.8,Glúteos:4.5};

const DEFAULT_LIBRARY=[
  {id:'press-banca',name:'Press banca',muscle:'Pecho',isCardio:false},
  {id:'press-inclinado',name:'Press inclinado',muscle:'Pecho',isCardio:false},
  {id:'aperturas',name:'Aperturas con mancuernas',muscle:'Pecho',isCardio:false},
  {id:'fondos',name:'Fondos en paralelas',muscle:'Pecho',isCardio:false},
  {id:'jalones',name:'Jalones al pecho',muscle:'Espalda',isCardio:false},
  {id:'remo-barra',name:'Remo con barra',muscle:'Espalda',isCardio:false},
  {id:'dominadas',name:'Dominadas',muscle:'Espalda',isCardio:false},
  {id:'remo-polea',name:'Remo en polea',muscle:'Espalda',isCardio:false},
  {id:'sentadilla',name:'Sentadilla',muscle:'Piernas',isCardio:false},
  {id:'prensa',name:'Prensa de piernas',muscle:'Piernas',isCardio:false},
  {id:'peso-muerto',name:'Peso muerto',muscle:'Piernas',isCardio:false},
  {id:'extension-cuad',name:'Extensión de cuádriceps',muscle:'Piernas',isCardio:false},
  {id:'curl-femoral',name:'Curl femoral',muscle:'Piernas',isCardio:false},
  {id:'press-militar',name:'Press militar',muscle:'Hombros',isCardio:false},
  {id:'elevaciones-lat',name:'Elevaciones laterales',muscle:'Hombros',isCardio:false},
  {id:'pajaro',name:'Pájaro con mancuernas',muscle:'Hombros',isCardio:false},
  {id:'curl-biceps',name:'Curl de bíceps',muscle:'Bíceps',isCardio:false},
  {id:'curl-martillo',name:'Curl martillo',muscle:'Bíceps',isCardio:false},
  {id:'press-frances',name:'Press francés',muscle:'Tríceps',isCardio:false},
  {id:'extension-triceps',name:'Extensión tríceps polea',muscle:'Tríceps',isCardio:false},
  {id:'crunch',name:'Crunch abdominal',muscle:'Core',isCardio:false},
  {id:'plancha',name:'Plancha',muscle:'Core',isCardio:false},
  {id:'hip-thrust',name:'Hip thrust',muscle:'Glúteos',isCardio:false},
  {id:'patada-gluteo',name:'Patada de glúteo',muscle:'Glúteos',isCardio:false},
  {id:'carrera',name:'Carrera',muscle:'Cardio',isCardio:true},
  {id:'bicicleta',name:'Bicicleta estática',muscle:'Cardio',isCardio:true},
  {id:'eliptica',name:'Elíptica',muscle:'Cardio',isCardio:true},
  {id:'remo-cardio',name:'Remo (cardio)',muscle:'Cardio',isCardio:true},
  {id:'cuerda',name:'Comba / Saltar a la cuerda',muscle:'Cardio',isCardio:true},
];

// ---- Local Storage ----
function loadState(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function saveState(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

// ---- Calorie estimation (MET-based, Ainsworth et al. 2011) ----
function estimateStrengthCals(exercise,bw){
  if(!bw||bw<=0)return 0;
  const met=MUSCLE_MET[exercise.muscle]||4.0;
  return Math.round(exercise.sets.reduce((t,s)=>{
    const reps=parseInt(s.reps)||0;if(!reps)return t;
    const hrs=(reps*3+90)/3600;
    const im=reps<=5?1.25:reps<=10?1.05:reps<=15?0.9:0.75;
    const lf=1+((parseFloat(s.weight)||0)/(bw*3))*0.15;
    return t+met*im*lf*bw*hrs;
  },0));
}
function estimateCardioCals(exercise,bw){
  if(!bw||bw<=0)return 0;
  const min=exercise.sets.reduce((t,s)=>t+(parseFloat(s.duration)||0),0);
  return Math.round(7.0*bw*(min/60));
}
function calcSessionCals(exercises,bw){
  return exercises.reduce((t,e)=>t+(e.isCardio?estimateCardioCals(e,bw):estimateStrengthCals(e,bw)),0);
}

// ---- Helpers ----
function today(){return new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})}
function fmtDate(d){return new Date(d).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtShort(d){return new Date(d).toLocaleDateString('es-ES',{day:'numeric',month:'short'})}

// ---- Charts ----
function BarChart({labels,data,color}){
  const ref=useRef(),cr=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(cr.current)cr.current.destroy();
    const dk=matchMedia('(prefers-color-scheme:dark)').matches;
    const gc=dk?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)',tc=dk?'#777':'#888';
    cr.current=new Chart(ref.current,{
      type:'bar',
      data:{labels,datasets:[{data,backgroundColor:color||'#E24B4A',borderRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
                y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}}}}
    });
    return()=>{if(cr.current)cr.current.destroy()};
  },[labels,data,color]);
  return h('div',{className:'chartw'},h('canvas',{ref}));
}
function LineChart({labels,data,color}){
  const ref=useRef(),cr=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(cr.current)cr.current.destroy();
    const dk=matchMedia('(prefers-color-scheme:dark)').matches;
    const gc=dk?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)',tc=dk?'#777':'#888';
    cr.current=new Chart(ref.current,{
      type:'line',
      data:{labels,datasets:[{data,borderColor:color||'#378ADD',backgroundColor:(color||'#378ADD')+'25',fill:true,tension:.35,pointBackgroundColor:color||'#378ADD',pointRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
                y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}}}}
    });
    return()=>{if(cr.current)cr.current.destroy()};
  },[labels,data,color]);
  return h('div',{className:'chartw'},h('canvas',{ref}));
}

// ---- Exercise Picker ----
function ExercisePicker({library,onSelect,onCreateNew}){
  const [query,setQuery]=useState('');
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('touchstart',h);document.addEventListener('mousedown',h);
    return()=>{document.removeEventListener('touchstart',h);document.removeEventListener('mousedown',h)};
  },[]);
  const filtered=useMemo(()=>{
    const q=query.toLowerCase().trim();
    return q?library.filter(e=>e.name.toLowerCase().includes(q)||e.muscle.toLowerCase().includes(q)):library;
  },[library,query]);
  const grouped=useMemo(()=>{
    const g={};filtered.forEach(e=>{if(!g[e.muscle])g[e.muscle]=[];g[e.muscle].push(e);});return g;
  },[filtered]);
  function select(ex){setQuery('');setOpen(false);onSelect(ex);}
  return h('div',{className:'picker-wrap',ref},
    h('input',{className:'picker-search',placeholder:'Buscar ejercicio...',value:query,
      onFocus:()=>setOpen(true),onChange:e=>{setQuery(e.target.value);setOpen(true);}}),
    open&&h('div',{className:'picker-dropdown'},
      Object.entries(grouped).map(([muscle,exs])=>h('div',{key:muscle},
        h('div',{className:'picker-group-label'},muscle),
        exs.map(ex=>h('div',{key:ex.id,className:'picker-option',onTouchEnd:e=>{e.preventDefault();select(ex);},onMouseDown:()=>select(ex)},
          h('span',null,ex.name),

// ---- Achievements engine ----
function calcStreak(sessions){
  if(!sessions.length)return 0;
  const days=[...new Set(sessions.map(s=>new Date(s.date).toDateString()))].map(d=>new Date(d)).sort((a,b)=>b-a);
  let streak=1,max=1;
  for(let i=1;i<days.length;i++){
    const diff=(days[i-1]-days[i])/864e5;
    if(diff===1){streak++;max=Math.max(max,streak);}else streak=1;
  }
  // check streak is current (last session today or yesterday)
  const lastDiff=(new Date()-days[0])/864e5;
  return lastDiff<2?max:0;
}
function maxWeightForExercise(sessions,exName){
  let max=0;
  sessions.forEach(s=>s.exercises.filter(e=>e.name.toLowerCase().includes(exName.toLowerCase())).forEach(e=>{
    e.sets.forEach(set=>{const w=parseFloat(set.weight)||0;if(w>max)max=w;});
  }));
  return max;
}
function totalVolume(sessions){return sessions.reduce((t,s)=>t+s.totalVolume,0);}
function totalSessions(sessions){return sessions.length;}
function totalCalories(sessions){return sessions.reduce((t,s)=>t+(s.calories||0),0);}
function totalCardioMin(sessions){return sessions.reduce((t,s)=>t+(s.totalCardioMin||0),0);}
function muscleGroupCount(sessions){
  const groups=new Set();
  sessions.forEach(s=>s.exercises.forEach(e=>{if(!e.isCardio)groups.add(e.muscle);}));
  return groups.size;
}
function uniqueExerciseCount(sessions){
  const names=new Set();
  sessions.forEach(s=>s.exercises.forEach(e=>names.add(e.name)));
  return names.size;
}
function maxSingleSessionVolume(sessions){
  return sessions.reduce((m,s)=>Math.max(m,s.totalVolume),0);
}
function maxSingleSessionCal(sessions){
  return sessions.reduce((m,s)=>Math.max(m,s.calories||0),0);
}
function daysActive(sessions){
  return new Set(sessions.map(s=>new Date(s.date).toDateString())).size;
}

// ---- Helpers for profile ----
function calcAge(dob){
  if(!dob)return '';
  const b=new Date(dob), now=new Date();
  let age=now.getFullYear()-b.getFullYear();
  if(now<new Date(now.getFullYear(),b.getMonth(),b.getDate()))age--;
  return age;
}
function getInitials(name){
  if(!name)return '?';
  return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

  if(intensity<=0)return base||'rgba(90,85,80,0.18)';
  const t=Math.pow(intensity,.7);
  const r=Math.round(210+25*t), g=Math.round(55-45*t), b=Math.round(55-45*t);
  const a=0.25+0.75*t;
  return `rgba(${r},${g},${b},${a})`;
}

function BodyMap({muscleIntensity}){
  const regionIntensity={};
  Object.entries(muscleIntensity).forEach(([muscle,intensity])=>{
    const regions=MUSCLE_TO_REGIONS[muscle]||[];
    regions.forEach(r=>{
      regionIntensity[r]=Math.max(regionIntensity[r]||0,intensity*(muscle==='Cardio'?0.4:1));
    });
  });
  return h('div',{className:'sc-map-wrap'},
    h('div',{className:'sc-map-side'},h(FrontBody,{ri:regionIntensity}),h('div',{className:'sc-map-side-label'},'Frontal')),
    h('div',{className:'sc-map-side'},h(BackBody,{ri:regionIntensity}),h('div',{className:'sc-map-side-label'},'Posterior'))
  );
}

const CONGRATS=[
  '¡Gran entrenamiento!','¡Lo has dado todo!','¡Sesión completada!',
  '¡Máximo esfuerzo!','¡Otro día, otro PR!'
];
const MUSCLE_PALETTE={
  Pecho:'#E24B4A',Espalda:'#378ADD',Piernas:'#3B6D11',
  Hombros:'#BA7517',Bíceps:'#378ADD',Tríceps:'#E24B4A',
  Core:'#72243E',Glúteos:'#3B6D11',Cardio:'#185FA5'
};

function SessionCompleteModal({session,onClose}){
  const [visible,setVisible]=useState(false);
  useEffect(()=>{setTimeout(()=>setVisible(true),30);},[]);

  // Muscle volume map
  const muscleVolume={};
  session.exercises.forEach(ex=>{
    if(ex.isCardio){
      const min=ex.sets.reduce((t,s)=>t+(parseFloat(s.duration)||0),0);
      muscleVolume['Cardio']=(muscleVolume['Cardio']||0)+min*5; // weight equivalent proxy
    } else {
      const vol=ex.sets.reduce((t,s)=>t+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0);
      muscleVolume[ex.muscle]=(muscleVolume[ex.muscle]||0)+vol;
    }
  });
  const totalVol=Object.values(muscleVolume).reduce((a,b)=>a+b,0)||1;
  const musclePct=Object.entries(muscleVolume)
    .map(([m,v])=>({muscle:m,pct:Math.round(v/totalVol*100)}))
    .sort((a,b)=>b.pct-a.pct);
  // normalised 0-1 for body map
  const maxPct=musclePct[0]?.pct||1;
  const muscleIntensity=Object.fromEntries(musclePct.map(({muscle,pct})=>[muscle,pct/maxPct]));

  const totalSets=session.exercises.filter(e=>!e.isCardio).reduce((t,e)=>t+e.sets.length,0);
  const totalCardioMin=session.exercises.filter(e=>e.isCardio).reduce((t,e)=>t+e.sets.reduce((s,set)=>s+(parseFloat(set.duration)||0),0),0);
  const durationSecs=session.durationSecs||0;
  const greeting=CONGRATS[Math.floor(Math.random()*CONGRATS.length)];
  const timeStr=new Date(session.date).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

  if(!visible)return null;
  return h('div',{className:'sc-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'sc-sheet'},
      h('div',{className:'sc-header'},
        h('span',{className:'sc-emoji'},'💪'),
        h('div',{className:'sc-title'},greeting),
        h('div',{className:'sc-subtitle'},new Date(session.date).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})+' · '+timeStr)
      ),
      h('div',{className:'sc-body'},
        h('div',{className:'sc-stats-row'},
          h('div',{className:'sc-stat highlight'},
            h('div',{className:'sc-stat-val'},session.calories||0),
            h('div',{className:'sc-stat-unit'},'kcal'),
            h('div',{className:'sc-stat-label'},'Calorías')
          ),
          durationSecs>0
            ? h('div',{className:'sc-stat'},
                h('div',{className:'sc-stat-val'},fmtDuration(durationSecs)),
                h('div',{className:'sc-stat-unit'},'duración'),
                h('div',{className:'sc-stat-label'},'Tiempo')
              )
            : h('div',{className:'sc-stat'},
                h('div',{className:'sc-stat-val'},session.exercises.length),
                h('div',{className:'sc-stat-unit'},'ejercicios'),
                h('div',{className:'sc-stat-label'},'Realizados')
              ),
          totalSets>0
            ? h('div',{className:'sc-stat'},
                h('div',{className:'sc-stat-val'},totalSets),
                h('div',{className:'sc-stat-unit'},'series'),
                h('div',{className:'sc-stat-label'},'Completadas')
              )
            : h('div',{className:'sc-stat'},
                h('div',{className:'sc-stat-val'},totalCardioMin),
                h('div',{className:'sc-stat-unit'},'minutos'),
                h('div',{className:'sc-stat-label'},'Cardio')
              )
        ),
        session.totalVolume>0&&h('div',{style:{textAlign:'center',fontSize:13,color:'var(--t2)',marginBottom:20,marginTop:-6}},
          session.exercises.length+' ejercicios · ',h('strong',{style:{color:'var(--t1)'}},Math.round(session.totalVolume).toLocaleString('es-ES')+' kg vol.')
        ),

        // Body map
        h('div',{className:'sc-map-title'},'Músculos trabajados'),
        h(BodyMap,{muscleIntensity}),

        // Legend bars
        h('div',{className:'sc-muscle-legend'},
          musclePct.filter(m=>m.pct>0).map(({muscle,pct})=>
            h('div',{key:muscle,className:'sc-legend-row'},
              h('div',{className:'sc-legend-dot',style:{background:MUSCLE_PALETTE[muscle]||'var(--accent)'}}),
              h('div',{className:'sc-legend-name'},muscle),
              h('div',{className:'sc-legend-bar-wrap'},
                h('div',{className:'sc-legend-bar',style:{width:pct+'%',background:MUSCLE_PALETTE[muscle]||'var(--accent)'}})
              ),
              h('div',{className:'sc-legend-pct'},pct+'%')
            )
          )
        ),

        h('button',{className:'btn btnp',style:{width:'100%',height:50,fontSize:15},onClick:onClose},'Cerrar')
      )
    )
  );
}

// ---- Workout Tab ----
function fmtDuration(secs){
  const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=secs%60;
  if(h>0)return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

  const [completedSession,setCompletedSession]=useState(null);
  const [timerStart,setTimerStart]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const timerRef=useRef();
  const currentWeight=weightLog.length>0?weightLog[weightLog.length-1].weight:0;
  const estTotal=currentWeight>0?calcSessionCals(exercises,currentWeight):null;

  // Notify App whether there's an active session
  useEffect(()=>{onActiveSessionChange&&onActiveSessionChange(exercises.length>0);},[exercises.length]);

  // Start timer on first exercise
  useEffect(()=>{
    if(exercises.length===1&&!timerStart){
      const start=Date.now();
      setTimerStart(start);
      setElapsed(0);
    }
    if(exercises.length===0){
      clearInterval(timerRef.current);
      setTimerStart(null);setElapsed(0);
    }
  },[exercises.length]);

  // Tick every second
  useEffect(()=>{
    if(!timerStart)return;
    timerRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-timerStart)/1000)),1000);
    return()=>clearInterval(timerRef.current);
  },[timerStart]);

  function selectFromLibrary(libEx){
    setExercises(prev=>[...prev,{id:Date.now(),libraryId:libEx.id,name:libEx.name,muscle:libEx.muscle,isCardio:libEx.isCardio,
      sets:libEx.isCardio?[{id:Date.now(),duration:''}]:[{id:Date.now(),reps:'',weight:''}]}]);
  }
  function saveNewToLibrary(libEx){onAddToLibrary(libEx);selectFromLibrary(libEx);}
  function save(){
    if(!exercises.length){alert('Añade al menos un ejercicio');return;}
    clearInterval(timerRef.current);
    const durationSecs=timerStart?Math.floor((Date.now()-timerStart)/1000):0;
    const cal=currentWeight>0?calcSessionCals(exercises,currentWeight):0;
    const vol=exercises.filter(e=>!e.isCardio).reduce((t,e)=>t+e.sets.reduce((s,set)=>s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);
    const cardioMin=exercises.filter(e=>e.isCardio).reduce((t,e)=>t+e.sets.reduce((s,set)=>s+(parseFloat(set.duration)||0),0),0);
    const session={id:Date.now(),date:new Date().toISOString(),exercises:[...exercises],totalVolume:vol,totalCardioMin:cardioMin,calories:cal,durationSecs};
    onSave(session);
    setExercises([]);setTimerStart(null);setElapsed(0);
    setCompletedSession(session);
  }
  return h('div',{className:'content'},
    showNewEx&&h(NewExerciseModal,{initialName:newExName,onSave:saveNewToLibrary,onClose:()=>setShowNewEx(false)}),
    completedSession&&h(SessionCompleteModal,{session:completedSession,onClose:()=>setCompletedSession(null)}),
    h('div',{className:'ptitle'},'HOY'),
    h('div',{className:'psub'},new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})),
    h(ProfileBanner,{profile,weightLog,onGoToProfile}),
    timerStart&&h('div',{className:'workout-timer'},
      h('div',{className:'timer-dot'}),
      h('div',{className:'timer-display'},fmtDuration(elapsed)),
      h('div',{className:'timer-label'},'Tiempo de sesión')
    ),
    exercises.length>0&&estTotal!==null&&h('div',{className:'cal-preview'},
      h('div',null,h('div',{className:'kcal-num'},'🔥 '+estTotal+' kcal'),h('div',{className:'kcal-sub'},'estimadas esta sesión'),h('div',{className:'kcal-note'},'Se actualiza en tiempo real'))
    ),
    h('div',{className:'card'},
      h('div',{className:'cardtitle',style:{marginBottom:10}},'Añadir ejercicio'),
      h(ExercisePicker,{library,onSelect:selectFromLibrary,onCreateNew:(n)=>{setNewExName(n);setShowNewEx(true);}})
    ),
    exercises.length>0&&h('div',{className:'card'},
      h('div',{className:'cardtitle'},'Esta sesión ('+(exercises.length)+')'),
      exercises.map((e,i)=>h(ExerciseBlock,{key:e.id,ex:e,onChange:ex=>setExercises(prev=>prev.map((x,j)=>j===i?ex:x)),onRemove:()=>setExercises(prev=>prev.filter((_,j)=>j!==i)),bw:currentWeight}))
    ),
    h('div',{style:{display:'flex',gap:10}},
      h('button',{className:'btn btnp',style:{flex:1},onClick:save},'Guardar sesión'),
      exercises.length>0&&h('button',{className:'btn btns',onClick:()=>{clearInterval(timerRef.current);setExercises([]);setTimerStart(null);setElapsed(0);}},'Descartar')
    )
  );
}

// ---- Training Calendar ----
function TrainingCalendar({sessions}){
  const now=new Date();
  const [viewYear,setViewYear]=useState(now.getFullYear());
  const [viewMonth,setViewMonth]=useState(now.getMonth()); // 0-based

  // Build set of trained date strings "YYYY-MM-DD" for the viewed month
  const trainedDays=useMemo(()=>{
    const s=new Set();
    sessions.forEach(sess=>{
      const d=new Date(sess.date);
      if(d.getFullYear()===viewYear&&d.getMonth()===viewMonth){
        s.add(d.getDate());
      }
    });
    return s;
  },[sessions,viewYear,viewMonth]);

  function prevMonth(){
    if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}
    else setViewMonth(m=>m-1);
  }
  function nextMonth(){
    const ny=viewMonth===11?viewYear+1:viewYear;
    const nm=viewMonth===11?0:viewMonth+1;
    // don't go past current month
    if(ny>now.getFullYear()||(ny===now.getFullYear()&&nm>now.getMonth()))return;
    setViewMonth(nm);setViewYear(ny);
  }

  const monthName=new Date(viewYear,viewMonth,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const firstDow=(new Date(viewYear,viewMonth,1).getDay()+6)%7; // Mon=0
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const daysInPrev=new Date(viewYear,viewMonth,0).getDate();
  const totalCells=Math.ceil((firstDow+daysInMonth)/7)*7;
  const isCurrentMonth=viewYear===now.getFullYear()&&viewMonth===now.getMonth();
  const trainedCount=trainedDays.size;

  const cells=[];
  for(let i=0;i<totalCells;i++){
    let day,isCurrentMonthDay=true;
    if(i<firstDow){day=daysInPrev-firstDow+1+i;isCurrentMonthDay=false;}
    else if(i>=firstDow+daysInMonth){day=i-firstDow-daysInMonth+1;isCurrentMonthDay=false;}
    else{day=i-firstDow+1;}
    const isTrained=isCurrentMonthDay&&trainedDays.has(day);
    const isToday=isCurrentMonthDay&&isCurrentMonth&&day===now.getDate();
    const cls=['cal-day',!isCurrentMonthDay?'other-month':'',isTrained?'trained':'',isToday?'today':''].filter(Boolean).join(' ');
    cells.push(h('div',{key:i,className:cls},day));
  }

  const atMaxMonth=isCurrentMonth;

  return h('div',{className:'card'},
    h('div',{className:'cal-nav'},
      h('button',{className:'cal-nav-btn',onClick:prevMonth},'‹'),
      h('div',{style:{textAlign:'center'}},
        h('div',{className:'cal-month-label'},monthName.charAt(0).toUpperCase()+monthName.slice(1)),
        trainedCount>0&&h('div',{style:{fontSize:11,color:'var(--accent)',fontWeight:600,marginTop:2}},trainedCount+' día'+(trainedCount!==1?'s':'')+' entrenado'+(trainedCount!==1?'s':''))
      ),
      h('button',{className:'cal-nav-btn',onClick:nextMonth,style:{opacity:atMaxMonth?.3:1,cursor:atMaxMonth?'default':'pointer'}},'›')
    ),
    h('div',{className:'cal-grid'},
      ['L','M','X','J','V','S','D'].map(d=>h('div',{key:d,className:'cal-dow'},d)),
      ...cells
    ),
    h('div',{className:'cal-legend'},
      h('div',{className:'cal-legend-dot',style:{background:'var(--accent)'}}),
      h('span',null,'Día entrenado'),
      h('div',{className:'cal-legend-dot',style:{background:'transparent',boxShadow:'0 0 0 2px var(--accent2)'}}),
      h('span',null,'Hoy')
    )
  );
}

// ---- Stats Tab ----
function StatsTab({sessions}){
  const [period,setPeriod]=useState('week');
  const [selEx,setSelEx]=useState('');
  const now=new Date();
  const cutoff=period==='week'?new Date(now-7*864e5):period==='month'?new Date(now-30*864e5):new Date(now-365*864e5);
  const filtered=sessions.filter(s=>new Date(s.date)>=cutoff);
  const totalVol=filtered.reduce((s,x)=>s+x.totalVolume,0);
  const totalCal=filtered.reduce((s,x)=>s+(x.calories||0),0);
  const totalCardio=filtered.reduce((s,x)=>s+(x.totalCardioMin||0),0);
  const avgDurSecs=filtered.filter(s=>s.durationSecs>0).length>0
    ?Math.round(filtered.filter(s=>s.durationSecs>0).reduce((t,s)=>t+(s.durationSecs||0),0)/filtered.filter(s=>s.durationSecs>0).length)
    :0;

  function bucket(ss,i){
    if(period==='week'){const d=new Date(now);d.setDate(d.getDate()-(6-i));return ss.filter(s=>new Date(s.date).toDateString()===d.toDateString());}
    if(period==='month'){const df=i*7;return ss.filter(s=>{const d=Math.floor((now-new Date(s.date))/864e5);return d>=df&&d<df+7;});}
    return ss.filter(s=>new Date(s.date).getMonth()===i);
  }
  let labels=[];
  if(period==='week'){for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('es-ES',{weekday:'short'}));}}
  else if(period==='month')labels=['S1','S2','S3','S4'];
  else labels=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const volData=labels.map((_,i)=>Math.round(bucket(filtered,i).reduce((a,s)=>a+s.totalVolume,0)));
  const calData=labels.map((_,i)=>bucket(filtered,i).reduce((a,s)=>a+(s.calories||0),0));

  const strengthExNames=[...new Set(sessions.flatMap(s=>s.exercises.filter(e=>!e.isCardio).map(e=>e.name)))].sort();
  const selName=selEx||strengthExNames[0]||'';
  const exHistory=sessions.slice().reverse().filter(s=>s.exercises.some(e=>e.name===selName)).map(s=>{
    const ex=s.exercises.find(e=>e.name===selName);
    return {date:fmtShort(s.date),maxW:Math.max(...ex.sets.map(s=>parseFloat(s.weight)||0))};
  });

  const allEx={};
  sessions.forEach(s=>s.exercises.forEach(e=>{
    if(e.isCardio)return;
    if(!allEx[e.name])allEx[e.name]={name:e.name,max:0,cnt:0,muscle:e.muscle};
    const mw=Math.max(...e.sets.map(s=>parseFloat(s.weight)||0));
    if(mw>allEx[e.name].max)allEx[e.name].max=mw;
    allEx[e.name].cnt++;
  }));
  const exList=Object.values(allEx).sort((a,b)=>b.cnt-a.cnt).slice(0,6);
  const maxW=Math.max(...exList.map(e=>e.max),1);

  return h('div',{className:'content'},
    h('div',{className:'ptitle'},'ESTADÍSTICAS'),
    h('div',{className:'psub'},'Evolución y rendimiento'),
    h('div',{className:'periodtabs'},['week','month','year'].map((p,i)=>h('button',{key:p,className:'pbtn'+(period===p?' active':''),onClick:()=>setPeriod(p)},['Semana','Mes','Año'][i]))),
    h('div',{className:'mgrid'},
      [{l:'Sesiones',v:filtered.length,u:''},{l:'Volumen',v:Math.round(totalVol).toLocaleString('es-ES'),u:'kg'},{l:'Calorías',v:totalCal.toLocaleString('es-ES'),u:'kcal'},{l:'Duración media',v:avgDurSecs>0?fmtDuration(avgDurSecs):'—',u:''}]
        .map(m=>h('div',{key:m.l,className:'mcard'},h('div',{className:'mlabel'},m.l),h('div',{className:'mval'},m.v,m.u&&h('span',{className:'unit'},' '+m.u))))
    ),
    h(TrainingCalendar,{sessions}),
    h('div',{className:'card'},h('div',{className:'cardtitle'},'Volumen (kg)'),h(BarChart,{labels,data:volData,color:'#E24B4A'})),
    h('div',{className:'card'},h('div',{className:'cardtitle'},'Calorías (kcal)'),h(BarChart,{labels,data:calData,color:'#BA7517'})),
    exHistory.length>1&&h('div',{className:'card'},
      h('div',{className:'cardtitle'},
        h('span',null,'Progresión de peso'),
        h('select',{value:selName,onChange:e=>setSelEx(e.target.value),style:{height:26,fontSize:12,border:'0.5px solid var(--border2)',borderRadius:6,background:'var(--bg2)',color:'var(--t1)',fontFamily:'inherit',padding:'0 6px'}},
          strengthExNames.map(n=>h('option',{key:n},n))
        )
      ),
      h(LineChart,{labels:exHistory.map(e=>e.date),data:exHistory.map(e=>e.maxW),color:'#E24B4A'})
    ),
    exList.length>0&&h('div',{className:'card'},
      h('div',{className:'cardtitle'},'Peso máximo por ejercicio'),
      exList.map(e=>h('div',{key:e.name,style:{marginBottom:14}},
        h('div',{className:'rowflex'},
          h('div',null,h('span',{style:{fontSize:13,fontWeight:600,color:'var(--t1)'}},e.name),' ',h('span',{className:`tag ${MUSCLE_COLORS[e.muscle]||'tb'}`},e.muscle)),
          h('span',{style:{fontSize:13,fontWeight:600,color:'var(--t1)'}},e.max+' kg')
        ),
        h('div',{className:'pbar'},h('div',{className:'pbarf',style:{width:Math.round((e.max/maxW)*100)+'%'}}))
      ))
    )
  );
}

    h('div',{className:'psub'},'Basadas en evidencia científica'),
    h('div',{className:'aibox'},h('div',{className:'ailabel'},'Análisis de tu entrenamiento'),h('p',{style:{fontSize:13,color:'var(--t1)',lineHeight:1.65}},analysis)),
    recs.map(r=>h('div',{key:r.t,className:'reccard',style:{borderLeftColor:r.c}},h('div',{className:'rectitle'},r.t),h('div',{className:'recbody'},r.b),h('div',{className:'recsrc'},r.s)))
  );
}

// ---- Backup Tab ----
function BackupTab({sessions,library,profile,weightLog,onRestore}){
  const [importError,setImportError]=useState('');
  const [importOk,setImportOk]=useState(false);
  const fileRef=useRef();

  const dataSize=useMemo(()=>{
    const raw=JSON.stringify({sessions,library,profile,weightLog});
    return (new Blob([raw]).size/1024).toFixed(1);
  },[sessions,library,profile,weightLog]);

  function exportData(){
    const payload={
      version:2,
      exportedAt:new Date().toISOString(),
      sessions,library,profile,weightLog
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const dateStr=new Date().toISOString().slice(0,10);
    a.download='ironlog-backup-'+dateStr+'.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleFileChange(e){
    setImportError('');setImportOk(false);
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.sessions||!Array.isArray(data.sessions))throw new Error('Formato inválido: falta la lista de sesiones.');
        if(!data.library||!Array.isArray(data.library))throw new Error('Formato inválido: falta la biblioteca.');
        const confirm=window.confirm(
          `Se van a importar:\n• ${data.sessions.length} sesiones\n• ${data.library.length} ejercicios\n\nEsto reemplazará todos los datos actuales. ¿Continuar?`
        );
        if(!confirm){e.target.value='';return;}
        onRestore(data);
        setImportOk(true);
      }catch(err){
        setImportError('Error al leer el archivo: '+err.message);
      }
      e.target.value='';
    };
    reader.readAsText(file);
  }

  return h('div',{className:'content'},
    h('div',{className:'ptitle'},'COPIA DE SEGURIDAD'),
    h('div',{className:'psub'},'Exporta e importa todos tus datos'),

    h('div',{className:'card'},
      h('div',{className:'cardtitle'},'Exportar'),
      h('p',{style:{fontSize:13,color:'var(--t2)',lineHeight:1.6,marginBottom:16}},
        'Descarga un archivo JSON con todas tus sesiones, ejercicios y perfil. Guárdalo en iCloud, Google Drive o donde prefieras. Puedes importarlo en cualquier momento para restaurar todo.'
      ),
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'var(--bg2)',borderRadius:10,marginBottom:14}},
        h('div',null,
          h('div',{style:{fontSize:13,fontWeight:600,color:'var(--t1)'}},sessions.length+' sesiones · '+library.length+' ejercicios'),
          h('div',{style:{fontSize:11,color:'var(--t2)',marginTop:2}},'Tamaño estimado: '+dataSize+' KB')
        ),
        h('div',{style:{fontSize:24}},'📦')
      ),
      h('button',{className:'btn btnp',style:{width:'100%'},onClick:exportData},
        '⬇ Descargar copia de seguridad'
      )
    ),

    h('div',{className:'card'},
      h('div',{className:'cardtitle'},'Importar'),
      h('p',{style:{fontSize:13,color:'var(--t2)',lineHeight:1.6,marginBottom:16}},
        'Selecciona un archivo de copia de seguridad generado por IronLog para restaurar tus datos. ',
        h('strong',{style:{color:'var(--accent)'}},'Atención: esto reemplazará todos los datos actuales.')
      ),
      h('input',{ref:fileRef,type:'file',accept:'.json,application/json',style:{display:'none'},onChange:handleFileChange}),
      h('button',{className:'btn btns',style:{width:'100%'},onClick:()=>fileRef.current.click()},
        '⬆ Seleccionar archivo de copia'
      ),
      importError&&h('div',{style:{marginTop:10,padding:'10px 14px',background:'#FCEBEB',borderRadius:8,fontSize:13,color:'#A32D2D',fontWeight:500}},importError),
      importOk&&h('div',{style:{marginTop:10,padding:'10px 14px',background:'#EAF3DE',borderRadius:8,fontSize:13,color:'#3B6D11',fontWeight:500}},'✅ Datos importados correctamente.')
    ),

    h('div',{className:'card'},
      h('div',{className:'cardtitle'},'Cómo guardar la copia en el iPhone'),
      h('p',{style:{fontSize:13,color:'var(--t2)',lineHeight:1.7}},
        '1. Pulsa "Descargar copia de seguridad".',h('br',null),
        '2. Safari te preguntará dónde guardarlo — elige ',h('strong',{style:{color:'var(--t1)'}},'iCloud Drive'),
        ' o ',h('strong',{style:{color:'var(--t1)'}},'En mi iPhone'),'.',h('br',null),
        '3. Para restaurar, abre IronLog, ven aquí e importa ese archivo desde la app Archivos.'
      )
    )
  );
}

// ---- App Root ----
function App(){
  const [tab,setTab]=useState('workout');
  const [sessions,setSessions]=useState(()=>loadState('il_sessions',[]));
  const [library,setLibrary]=useState(()=>loadState('il_library',DEFAULT_LIBRARY));
  const [profile,setProfile]=useState(()=>loadState('il_profile',{name:'',sex:'',dob:''}));
  const [weightLog,setWeightLog]=useState(()=>loadState('il_weightlog',[]));
  const [hasActiveSession,setHasActiveSession]=useState(false);

  useEffect(()=>saveState('il_sessions',sessions),[sessions]);
  useEffect(()=>saveState('il_library',library),[library]);
  useEffect(()=>saveState('il_profile',profile),[profile]);
  useEffect(()=>saveState('il_weightlog',weightLog),[weightLog]);

  function addSession(s){setSessions(prev=>[s,...prev]);}
  function addToLibrary(ex){setLibrary(prev=>[...prev,ex]);}
  function removeFromLibrary(id){setLibrary(prev=>prev.filter(e=>e.id!==id));}
  function addWeight(entry){setWeightLog(prev=>[...prev,entry].sort((a,b)=>new Date(a.date)-new Date(b.date)));}
  function removeWeight(id){setWeightLog(prev=>prev.filter(e=>e.id!==id));}
  function restoreBackup(data){
    setSessions(data.sessions);
    setLibrary(data.library);
    if(data.profile)setProfile(data.profile);
    if(data.weightLog)setWeightLog(data.weightLog);
  }

  const TABS=[
    {id:'workout', label:'Hoy',       Icon:Icons.workout},
    {id:'library', label:'Ejercicios',Icon:Icons.library},
    {id:'history', label:'Historial', Icon:Icons.history},
    {id:'stats',   label:'Stats',     Icon:Icons.stats},
    {id:'profile', label:'Perfil',    Icon:()=>h('svg',{viewBox:'0 0 24 24'},h('circle',{cx:12,cy:8,r:4}),h('path',{d:'M4 20c0-4 3.6-7 8-7s8 3 8 7'}))},
    {id:'backup',  label:'Backup',    Icon:()=>h('svg',{viewBox:'0 0 24 24'},h('path',{d:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4'}),h('polyline',{points:'7 10 12 15 17 10'}),h('line',{x1:'12',y1:'15',x2:'12',y2:'3'}))},
  ];

  return h('div',{className:'app'},
    h('div',{className:'topbar'},
      h('div',{className:'logo'},'IRON',h('span',null,'LOG')),
      h('div',{className:'datebadge'},today())
    ),
    h('div',{className:'nav'},
      TABS.map(t=>h('div',{key:t.id,className:'navbtn-wrap'},
        h('button',{className:'navbtn'+(tab===t.id?' active':''),onClick:()=>setTab(t.id),style:{width:'100%'}},
          h(t.Icon),h('span',null,t.label)
        ),
        t.id==='workout'&&hasActiveSession&&tab!=='workout'&&h('div',{className:'navbtn-dot'})
      ))
    ),
    // All tabs stay mounted — only active one is visible.
    h('div',{style:{display:tab==='workout'?'block':'none'}},
      h(WorkoutTab,{sessions,library,onSave:addSession,profile,weightLog,onGoToProfile:()=>setTab('profile'),onAddToLibrary:addToLibrary,onActiveSessionChange:setHasActiveSession})),
    h('div',{style:{display:tab==='library'?'block':'none'}},
      h(LibraryTab,{library,sessions,onAdd:addToLibrary,onRemove:removeFromLibrary})),
    h('div',{style:{display:tab==='history'?'block':'none'}},
      h(HistoryTab,{sessions})),
    h('div',{style:{display:tab==='stats'?'block':'none'}},
      h(StatsTab,{sessions})),
    h('div',{style:{display:tab==='profile'?'block':'none'}},
      h(ProfileTab,{profile,onChange:setProfile,weightLog,onAddWeight:addWeight,onRemoveWeight:removeWeight,sessions})),
    h('div',{style:{display:tab==='backup'?'block':'none'}},
      h(BackupTab,{sessions,library,profile,weightLog,onRestore:restoreBackup}))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
